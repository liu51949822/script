# 仓库镜像同步工作流
# 功能：自动同步到 Gitee / GitLab / Coding 等镜像仓库
# 使用前：Settings > Secrets 添加 MIRROR_URL, MIRROR_USERNAME, MIRROR_TOKEN

name: Sync Mirror

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 */6 * * *'      # 每6小时同步一次
  workflow_dispatch:

jobs:
  sync-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码（含完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 同步到 Gitee
        run: |
          git remote add gitee ${{ secrets.GITEE_MIRROR_URL }} 2>/dev/null || true
          git push gitee main:master --force --tags
          echo "✅ Gitee 同步完成"

      - name: 📊 同步摘要
        run: |
          echo "### 镜像同步结果" >> $GITHUB_STEP_SUMMARY
          echo "| 目标 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitee | ✅ 已完成 |" >> $GITHUB_STEP_SUMMARY
