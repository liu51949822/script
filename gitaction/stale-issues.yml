# 自动关闭过期 Issue 工作流
# 功能：自动关闭长时间无活动的 Issue，添加 stale 标签
# 触发：定时运行 (每天 UTC 0:00)

name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'       # 每天运行一次
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: 🕐 标记并关闭过期 Issue
        uses: actions/stale@v9
        with:
          days-before-issue-stale: 60          # 60天无活动标记为 stale
          days-before-issue-close: 14          # 再14天后关闭
          stale-issue-message: |
            ## ⚠️ Issue 即将关闭
            
            该 Issue 已超过 60 天无活动，已被标记为 stale。
            如果此问题仍然存在，请在 14 天内回复，否则将被自动关闭。
            
            感谢您的贡献！🙏
          close-issue-message: |
            ## 🔒 Issue 已关闭
            
            该 Issue 因长期无活动已被自动关闭。
            如有需要，请创建新 Issue 或重新打开此 Issue。
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,bug,help-wanted"
          days-before-pr-stale: 90
          days-before-pr-close: 14
          stale-pr-message: "该 PR 已超过 90 天无更新，将被自动关闭。"
          close-pr-message: "该 PR 因长期无活动已关闭。"
